<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" fill="#061820"/>

  <!-- Petrol glow layer -->
  <rect width="128" height="128" rx="24" fill="url(#grad)" opacity="0.9"/>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e4a5c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a2535;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- F letterform -->
  <rect x="34" y="30" width="11" height="68" rx="3" fill="#22d3ee"/>
  <rect x="34" y="30" width="54" height="11" rx="3" fill="#22d3ee"/>
  <rect x="34" y="58" width="44" height="10" rx="3" fill="#22d3ee"/>

  <!-- Fanout dot cluster (represents diverging queries) -->
  <circle cx="96" cy="60" r="5" fill="#67e8f9" opacity="0.9"/>
  <circle cx="96" cy="76" r="3.5" fill="#67e8f9" opacity="0.6"/>
  <circle cx="96" cy="44" r="3.5" fill="#67e8f9" opacity="0.6"/>
</svg>
