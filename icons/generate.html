<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generate Fanout Icons</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a1a25; color: #e2f4f7; padding: 40px; }
    h1 { color: #22d3ee; }
    .grid { display: flex; gap: 24px; flex-wrap: wrap; margin: 24px 0; }
    .card { background: #0d2840; border: 1px solid #0e4a5c; border-radius: 8px; padding: 16px; text-align: center; }
    canvas { display: block; margin: 8px auto; }
    button {
      display: block; margin: 8px auto 0;
      background: #0e7490; color: white; border: none;
      padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #0891b2; }
    p { color: #7ecfdb; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>Fanout Icon Generator</h1>
  <p>Open this file in a browser. Click each download button to save the PNG icons, then place them in the <code>icons/</code> folder.</p>

  <div class="grid" id="grid"></div>

  <script>
    const SVG_SRC = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
      <rect width="128" height="128" rx="24" fill="#061820"/>
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#0e4a5c;stop-opacity:1"/>
          <stop offset="100%" style="stop-color:#0a2535;stop-opacity:1"/>
        </linearGradient>
      </defs>
      <rect width="128" height="128" rx="24" fill="url(#grad)" opacity="0.9"/>
      <rect x="34" y="30" width="11" height="68" rx="3" fill="#22d3ee"/>
      <rect x="34" y="30" width="54" height="11" rx="3" fill="#22d3ee"/>
      <rect x="34" y="58" width="44" height="10" rx="3" fill="#22d3ee"/>
      <circle cx="96" cy="60" r="5" fill="#67e8f9" opacity="0.9"/>
      <circle cx="96" cy="76" r="3.5" fill="#67e8f9" opacity="0.6"/>
      <circle cx="96" cy="44" r="3.5" fill="#67e8f9" opacity="0.6"/>
    </svg>`;

    const SIZES = [16, 32, 48, 128];
    const grid = document.getElementById('grid');

    SIZES.forEach(size => {
      const card = document.createElement('div');
      card.className = 'card';

      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;

      const label = document.createElement('div');
      label.textContent = `${size}×${size}`;
      label.style.fontSize = '12px';
      label.style.color = '#7ecfdb';
      label.style.marginTop = '6px';

      const btn = document.createElement('button');
      btn.textContent = `Download icon${size}.png`;
      btn.onclick = () => {
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = `icon${size}.png`;
        link.click();
      };

      const img = new Image();
      const blob = new Blob([SVG_SRC], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
      };
      img.src = url;

      card.appendChild(canvas);
      card.appendChild(label);
      card.appendChild(btn);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
